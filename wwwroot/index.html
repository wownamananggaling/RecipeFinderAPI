<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Recipe Finder API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <header class="main-header">
            <div class="brand">
                <div class="logo-mark">C</div>
                <h1>Recipe Finder API</h1>
            </div>
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        </header>

        <div class="layout-wrapper">
            <aside class="sidebar" id="sidebar">
                <div class="card">
                    <h3>My Pantry</h3>
                    <p class="small-text">Add ingredients to match with the API database.</p>
                    <div class="input-row">
                        <input type="text" id="ingInput" placeholder="e.g. Chicken">
                        <button class="btn-primary" onclick="addIngredient()">Add</button>
                    </div>
                    <div id="pantryTags" class="tag-container"></div>
                </div>

                <div class="card">
                    <h3>Preferences</h3>
                    <div class="field">
                        <label>Dietary Requirement</label>
                        <select id="dietPref" onchange="fetchAndMatch()">
                            <option value="All">All Diets</option>
                            <option value="Vegetarian">Vegetarian</option>
                            <option value="Non-Veg">Non-Vegetarian</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Max Cooking Time</label>
                        <select id="timePref" onchange="fetchAndMatch()">
                            <option value="999">Any Time</option>
                            <option value="30">Under 30 mins</option>
                            <option value="60">Under 60 mins</option>
                        </select>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                <div class="status-bar">
                    <h2 id="matchCount">Connecting to API...</h2>
                </div>
                <div class="recipe-grid" id="recipeGrid">
                    </div>
            </main>
        </div>

        <nav class="bottom-nav">
            <button class="nav-tab active">Match</button>
            <button class="nav-tab">Saved</button>
            <button class="nav-tab">Settings</button>
        </nav>
    </div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <script src="app.js"></script>
</body>
</html>
