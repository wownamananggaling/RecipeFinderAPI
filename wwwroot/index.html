<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vanguard Culinary System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-identity">
                <div class="logo-mark">V</div>
                <div class="logo-text">
                    <h2>Vanguard</h2>
                    <p>Culinary Portal</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-link active" onclick="switchView('discover')">Discover</a>
                <a href="#" class="nav-link" onclick="switchView('saved')">Saved Recipes</a>
                <a href="#" class="nav-link" onclick="switchView('settings')">Settings</a>
            </nav>
        </aside>

        <main class="main-container">
            <header class="content-header">
                <div class="header-titles">
                    <h1>Explore Cuisine</h1>
                    <p>Curated professional recipes for your collection.</p>
                </div>
                <div class="search-bar">
                    <input type="text" id="recipeSearch" placeholder="Search by name or ingredient...">
                    <button class="btn-primary" onclick="search()">Search</button>
                </div>
                <div class="filter-pills">
                    <button class="pill active">All</button>
                    <button class="pill">Breakfast</button>
                    <button class="pill">Main Course</button>
                    <button class="pill">Sides</button>
                </div>
            </header>

            <section class="recipe-grid" id="recipeGrid">
                </section>
        </main>

        <nav class="mobile-nav">
            <button class="mobile-tab active" onclick="switchView('discover')">Explore</button>
            <button class="mobile-tab" onclick="switchView('saved')">Saved</button>
            <button class="mobile-tab" onclick="switchView('settings')">Profile</button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
