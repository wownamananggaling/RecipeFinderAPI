<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vanguard Culinary System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-identity">
                <div class="logo-mark">V</div>
                <div class="logo-text">
                    <h2>Vanguard</h2>
                    <p>Professional Portal</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-link active" onclick="switchView('discover')">Recipe Matcher</a>
                <a href="#" class="nav-link" onclick="switchView('saved')">Saved Recipes</a>
                <a href="#" class="nav-link" onclick="switchView('settings')">Preferences</a>
            </nav>
        </aside>

        <main class="main-container">
            <header class="content-header">
                <h1>Smart Matcher</h1>
                <p>Enter your available ingredients to find matching professional recipes.</p>
                
                <div class="input-section">
                    <div class="search-bar">
                        <input type="text" id="ingredientInput" placeholder="Add ingredient (e.g. Chicken, Tomato)...">
                        <button class="btn-primary" onclick="addIngredient()">Add</button>
                    </div>
                    <div id="myIngredients" class="inventory-tags"></div>
                </div>

                <div class="filter-controls">
                    <select id="timeFilter" onchange="runMatching()">
                        <option value="all">Any Cooking Time</option>
                        <option value="30">Under 30 mins</option>
                        <option value="60">Under 60 mins</option>
                    </select>
                    <div id="preferenceDisplay" class="pref-badge"></div>
                </div>
            </header>

            <section class="recipe-grid" id="recipeGrid">
                </section>
        </main>

        <nav class="mobile-nav">
            <button class="mobile-tab active" onclick="switchView('discover')">Match</button>
            <button class="mobile-tab" onclick="switchView('saved')">Saved</button>
            <button class="mobile-tab" onclick="switchView('settings')">Prefs</button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
