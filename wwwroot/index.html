<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Recipe Finder App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <header class="main-header">
            <div class="logo">Recipe <span>Finder</span></div>
            <nav class="header-nav">
                <button class="nav-icon" onclick="toggleSettings()"></button>
            </nav>
        </header>

        <main class="main-layout">
            <section class="input-panel">
                <div class="card">
                    <h3>Ingredient Matcher</h3>
                    <p class="helper-text">Add ingredients to find recipes you can cook now.</p>
                    <div class="input-row">
                        <input type="text" id="ingInput" placeholder="Enter ingredient...">
                        <button class="btn-add" onclick="addIng()">Add</button>
                    </div>
                    <div id="ingList" class="tag-cloud"></div>
                </div>

                <div class="card">
                    <h3>User Preferences</h3>
                    <div class="pref-group">
                        <label>Dietary Filter</label>
                        <select id="dietPref" onchange="runMatch()">
                            <option value="All">All Diets</option>
                            <option value="Vegetarian">Vegetarian</option>
                            <option value="Non-Veg">Non-Vegetarian</option>
                        </select>
                    </div>
                    <div class="pref-group">
                        <label>Max Cooking Time</label>
                        <select id="timePref" onchange="runMatch()">
                            <option value="999">Any Time</option>
                            <option value="20">Under 20 mins</option>
                            <option value="45">Under 45 mins</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="results-panel">
                <div class="results-header">
                    <h2 id="matchCount">Available Recipes</h2>
                </div>
                <div id="recipeGrid" class="recipe-grid"></div>
            </section>
        </main>

        <nav class="mobile-nav">
            <button class="tab active">Explore</button>
            <button class="tab">Saved</button>
            <button class="tab">Profile</button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
