<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Recipe Finder Professional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <header class="mobile-header">
            <button class="menu-btn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <div class="logo">Recipe Finder</div>
            <div class="spacer"></div>
        </header>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Navigation</h2>
                <button class="close-menu" onclick="toggleMenu()">✕</button>
            </div>
            <nav class="nav-links">
                <a href="#" class="active">Search Recipes</a>
                <a href="#">My Favorites</a>
                <a href="#">Dietary Settings</a>
                <a href="#">Account</a>
            </nav>
        </aside>

        <main class="main-content">
            <section class="search-section">
                <div class="search-wrapper">
                    <input type="text" placeholder="Find a recipe..." id="searchInput">
                    <button id="searchBtn">Search</button>
                </div>
                <div class="chips-container">
                    <span class="chip active">All</span>
                    <span class="chip">Chicken</span>
                    <span class="chip">Seafood</span>
                    <span class="chip">Vegetarian</span>
                </div>
            </section>

            <section class="results-grid" id="resultsGrid">
                </section>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">Search</a>
            <a href="#" class="nav-item">Favorites</a>
            <a href="#" class="nav-item">Settings</a>
        </nav>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <script src="app.js"></script>
</body>
</html>
