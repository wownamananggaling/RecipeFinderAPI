<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Finder API</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <span class="logo">Recipe Finder API</span>
  <div id="nav-links">
    <a href="#" onclick="showPage('search')">Search</a>
    <a href="#" onclick="showPage('favorites')">Favorites</a>
    <a href="#" onclick="showPage('preferences')">Preferences</a>
  </div>
</nav>

<main class="container">

  <div id="page-search" class="page active">
    <section class="search-panel">
      <div class="search-row">
        <input type="text" id="search-query" placeholder="Search recipes (e.g. Garlic)..." />
        <button class="btn-main" onclick="searchRecipes()">Search</button>
      </div>
      
      <div class="filter-row">
        <input type="text" id="ingredients" placeholder="Ingredients" />
        <input type="text" id="dietary" placeholder="Dietary Type" />
        <input type="text" id="cuisine" placeholder="Cuisine" />
        <div class="btn-group">
          <button class="btn-main" onclick="filterRecipes()">Filter</button>
          <button class="btn-main" onclick="getRandom()">Random</button>
        </div>
      </div>
    </section>

    <div id="recipe-results" class="grid"></div>
  </div>

  <div id="page-detail" class="page">
    <button onclick="showPage('search')" class="back-btn">← Back to Search</button>
    <div id="recipe-detail" class="detail-card"></div>
  </div>

  <div id="page-favorites" class="page">
    <h2 class="section-title">Saved Favorites</h2>
    <div id="favorites-list" class="grid"></div>
  </div>

  <div id="page-preferences" class="page">
    <div class="card pref-card">
      <h2>User Preferences</h2>
      <div class="input-group">
        <label>Dietary Type</label>
        <input type="text" id="pref-dietary" placeholder="e.g. vegetarian" />
        
        <label>Excluded Ingredients</label>
        <input type="text" id="pref-excluded" placeholder="e.g. nuts" />
        
        <label>Preferred Cuisine</label>
        <input type="text" id="pref-cuisine" placeholder="e.g. Italian" />
        
        <label>Max Cooking Time (mins)</label>
        <input type="number" id="pref-time" placeholder="30" />
        
        <button class="btn-main" onclick="savePreferences()">Save Settings</button>
      </div>
      <p id="pref-msg" class="success-text"></p>
    </div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
