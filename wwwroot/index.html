<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <span class="logo"> Recipe Finder</span>
  <div id="nav-links">
    <a href="#" onclick="showPage('search')"> Search</a>
    <a href="#" onclick="showPage('favorites')"> Favorites</a>
    <a href="#" onclick="showPage('preferences')"> Preferences</a>
    <a href="#" onclick="logout()"> Logout</a>
  </div>
</nav>

<!-- Login Page -->
<div id="page-login" class="page active">
  <div class="auth-card">
    <h2> Welcome Back</h2>
    <input type="email" id="login-email" placeholder="Email" />
    <input type="password" id="login-password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <p>No account? <a href="#" onclick="showPage('register')">Register here</a></p>
    <p id="login-error" class="error"></p>
  </div>
</div>

<!-- Register Page -->
<div id="page-register" class="page">
  <div class="auth-card">
    <h2> Create Account</h2>
    <input type="text" id="reg-username" placeholder="Username" />
    <input type="email" id="reg-email" placeholder="Email" />
    <input type="password" id="reg-password" placeholder="Password" />
    <button onclick="register()">Register</button>
    <p>Have an account? <a href="#" onclick="showPage('login')">Login here</a></p>
    <p id="reg-error" class="error"></p>
  </div>
</div>

<!-- Search Page -->
<div id="page-search" class="page">
  <div class="search-bar">
    <input type="text" id="search-query" placeholder="Search recipes..." />
    <button onclick="searchRecipes()">Search</button>
  </div>
  <div class="filter-bar">
    <h4>🔧 Filter Recipes</h4>
    <div class="filter-row">
      <input type="text" id="ingredients" placeholder="Ingredients (e.g. chicken, garlic)" />
      <input type="text" id="dietary" placeholder="Dietary (e.g. vegetarian)" />
      <input type="text" id="cuisine" placeholder="Cuisine (e.g. Italian)" />
    </div>
    <div class="filter-buttons">
      <button class="btn-filter" onclick="filterRecipes()"> Filter</button>
      <button class="btn-random" onclick="getRandom()"> Random</button>
    </div>
  </div>
  <div id="recipe-results" class="grid"></div>
</div>

<!-- Detail Page -->
<div id="page-detail" class="page">
  <div id="recipe-detail"></div>
</div>

<!-- Favorites Page -->
<div id="page-favorites" class="page">
  <h2> My Favorites</h2>
  <div id="favorites-list" class="grid"></div>
</div>

<!-- Preferences Page -->
<div id="page-preferences" class="page">
  <div class="pref-card">
    <h2> My Preferences</h2>
    <label>Dietary Type</label>
    <input type="text" id="pref-dietary" placeholder="e.g. vegetarian, vegan" />
    <label>Excluded Ingredients</label>
    <input type="text" id="pref-excluded" placeholder="e.g. nuts, dairy" />
    <label>Preferred Cuisine</label>
    <input type="text" id="pref-cuisine" placeholder="e.g. Italian, Asian" />
    <label>Max Cooking Time (minutes)</label>
    <input type="number" id="pref-time" placeholder="e.g. 30" />
    <button onclick="savePreferences()">Save Preferences</button>
    <p id="pref-msg" class="success"></p>
  </div>
</div>

<!-- Bottom Nav (mobile only) -->
<div id="bottom-nav-bar" class="bottom-nav">
  <a href="#" onclick="showPage('search')" id="bnav-search">
    <span></span>Search
  </a>
  <a href="#" onclick="showPage('favorites')" id="bnav-favorites">
    <span></span>Favorites
  </a>
  <a href="#" onclick="showPage('preferences')" id="bnav-preferences">
    <span></span>Preferences
  </a>
  <a href="#" onclick="logout()" id="bnav-logout">
    <span></span>Logout
  </a>
</div>

<script src="app.js"></script>
</body>
</html>
