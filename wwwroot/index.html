<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-brand">
                Recipe Finder
                <span>Discover & Save Recipes</span>
            </div>
            <button class="hamburger" onclick="openNav()" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </header>

        <div class="nav-overlay" id="navOverlay" onclick="closeNav()"></div>

        <nav class="nav-drawer" id="navDrawer">
            <div class="nav-header">
                <span class="nav-header-title">Menu</span>
                <button class="nav-close" onclick="closeNav()">✕</button>
            </div>
            <div class="nav-items">
                <div class="nav-item active" onclick="showPage('search'); closeNav()">Search Recipes</div>
                <div class="nav-item" onclick="showPage('favorites'); closeNav()">My Favorites</div>
                <div class="nav-item" onclick="showPage('prefs'); closeNav()">Preferences</div>
            </div>
        </nav>

        <main class="page active" id="page-search">
            <div class="search-bar-wrap">
                <div class="search-input-row">
                    <input class="search-input" type="text" id="searchInput" placeholder="Search recipes...">
                    <button class="search-btn" onclick="doSearch()">Search</button>
                </div>
                <div class="filter-row">
                    <button class="filter-chip active" onclick="setFilter(this, 'All')">All</button>
                    <button class="filter-chip" onclick="setFilter(this, 'Chicken')">Chicken</button>
                    <button class="filter-chip" onclick="setFilter(this, 'Seafood')">Seafood</button>
                    <button class="filter-chip" onclick="setFilter(this, 'Vegetarian')">Vegetarian</button>
                </div>
            </div>
            <div class="recipe-grid" id="recipeGrid"></div>
        </main>

        <section class="page" id="page-detail">
            <div class="detail-header">
                <button class="back-btn" onclick="showPage('search')">← Back to results</button>
            </div>
            <div class="detail-body">
                <h1 id="detailTitle" class="detail-title"></h1>
                <div id="detailMeta" class="detail-meta-row"></div>
                <button class="fav-btn" id="favBtn" onclick="toggleFav()">Save to Favorites</button>
                <div class="detail-section">
                    <div class="detail-section-title">Instructions</div>
                    <div id="detailSteps" class="instructions"></div>
                </div>
            </div>
        </section>

        <section class="page" id="page-favorites">
            <div class="recipe-grid" id="favsGrid"></div>
        </section>

        <nav class="bottom-nav">
            <button class="bottom-nav-item active" id="bnav-search" onclick="showPage('search')">
                <span>Search</span>
            </button>
            <button class="bottom-nav-item" id="bnav-favorites" onclick="showPage('favorites')">
                <span>Favorites</span>
            </button>
            <button class="bottom-nav-item" id="bnav-prefs" onclick="showPage('prefs')">
                <span>Settings</span>
            </button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
